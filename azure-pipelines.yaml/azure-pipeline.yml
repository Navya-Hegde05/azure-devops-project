trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: votingapp

steps:

- task: Docker@2
  inputs:
    containerRegistry: 'dockerhub-connection'
    repository: 'votingapp'
    command: 'buildAndPush'
    Dockerfile: 'app/Dockerfile'
    tags: |
      latest

- task: KubernetesManifest@1
  inputs:
    action: deploy
    kubernetesServiceConnection: 'kubernetes'
    manifests: |
      k8s/deployment.yaml
      k8s/service.yaml