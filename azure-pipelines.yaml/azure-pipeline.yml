trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: votingapp
  acrName: devopsacr05.azurecr.io   # change if needed

steps:

# 1. Build + Push Docker Image to ACR
- task: Docker@2
  inputs:
    containerRegistry: 'acr-service-connection'
    repository: 'votingapp'
    command: 'buildAndPush'
    Dockerfile: 'app/Dockerfile'
    buildContext: 'app'
    tags: |
      latest

# 2. Deploy to AKS
- task: KubernetesManifest@1
  inputs:
    action: deploy
    kubernetesServiceConnection: 'aks-service-connection'
    manifests: |
      k8s/deployment.yaml
      k8s/service.yaml